<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');

    body {
        align-items: center;
        justify-content: center;
        text-align: center;

        display: flex;

        background-color: rgb(139, 139, 139);
    }

    .desk-page {
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .back {
        display: flex;
        flex-direction: row;
    }

    .pc {
        background-image: url("img/pc.png");
        width: 500px;
        height: 500px;

        background-repeat: no-repeat;
        background-color: transparent;

        position: relative;

        margin-left: 10px;
    }



    .hint {
        color: rgba(35, 228, 48, 0.87);
        font-family: "Jersey 15", sans-serif;

        position: absolute;
        text-align: center;
        align-items: center;
        justify-content: center;
        top: 30%;
        left: 30%;
        font-size: 20px;
    }

    .hintIncorrect {
        color: rgba(229, 45, 16, 0.87);
        font-family: "Jersey 15", sans-serif;

        position: absolute;
        text-align: center;
        align-items: center;
        justify-content: center;
        top: 30%;
        left: 35%;
        font-size: 20px;
    }

    .screen {
        display: flex;
        flex-direction: row;
        justify-items: center;
        text-align: center;

        position: absolute;

        top: 40%;
        width: 50%;
        gap: 5%;
        left: 32%;

    }

    .pcBtn {
        background-image: url("img/pc-on-off.png");
        background-size: contain;
        width: 25px;
        height: 25px;
        position: absolute;
        bottom: 12%;
        right: 20%;
        border-radius: 50%;
    }

    .signal {
        height: 8px;
        width: 8px;
        border-radius: 50%;
        background-color: rgba(56, 56, 56, 0.87);
        position: absolute;
        bottom: 12%;
        right: 28%;
    }

    #key1,
    #key2,
    #key3,
    #key4 {
        color: rgba(35, 228, 48, 0.87);
        font-size: 30px;
        border-color: rgba(35, 228, 48, 0.87);
        border-style: dashed;
        text-align: center;
        /* border-radius: 20%; */
        font-family: "Jersey 15", sans-serif;

        width: 25px;
        height: 25px;

        background-color: transparent;

        caret-color: rgba(35, 228, 48, 0.87);

        outline: none;
    }

    .keyBtn {
        position: absolute;
        top: 50%;
        left: 45%;
        text-align: center;
        align-items: center;
        height: 30px;
        width: 50px;
        background-color: rgba(35, 228, 48, 0.87);
        border: none;
        border-radius: 10px;
        font-family: "Jersey 15", sans-serif;
        font-size: 15px;
        color: #F1E7D2;
    }

    .keyBtn:hover {
        background-color: rgba(34, 167, 43, 0.87);
        color: #bda97f;
    }

    .core {
        background-image: url("img/core.png");
        background-color: transparent;
        height: 500px;
        width: 180px;
        position: relative;
    }

    .coreBtn {
        background-image: url("img/on-off.png");
        background-position: center;
        background-size: contain;
        position: absolute;
        bottom: 20%;
        right: 15%;
        width: 30px;
        height: 30px;

    }

    .incense {
        background-image: url("img/incense.png");
        background-position: center;
        background-size: contain;

        /* height: 100px;
        width: 120px; */
        height: 250px;
        width: 300px;
        position: absolute;
        left: 12vw;
        bottom: 22vh;
        z-index: 9999;
    }

    .smoke {
        background-image: url("img/smoke.png");
        height: 150px;
        width: 150px;

        background-size: contain;
        background-repeat: no-repeat;
        position: fixed;
        left: 25vw;
        bottom: 43vh;

        filter: blur(2px);
        z-index: 9999;

        animation: smokeAnimation 3s ease-in-out infinite;
    }

    @keyframes smokeAnimation {
        0% {
            filter:blur(2px);
            /* opacity: 0.9; */
        }
        30%{
            transform: rotateY(-20deg);
            filter:blur(3px);
            /* opacity: 0.8; */
        }
        75%{
            transform: rotateY(-5deg);
            filter:blur(2px);
            /* opacity: 0.8; */
        }
        100% {
            filter:blur(3px);
            transform: rotateY(15deg);
            /* opacity: 0.9; */
        }
    }
    /* .askToRotate {
        background-color: black;
        color: beige;
        height: 100vh;
        width: 100vw;
    }


    @media (orientation: portrait) {
        .askToRotate {
            display: revert;
        }
        .desk-page {
            display: none;
        }
    }

    @media (orientation: landscape) {
        .askToRotate {
            display: none;
        }

        .desk-page {
            display: revert;
        }
    } */


    /* @media(min-width:1200px) {
        .incense {
            height: 100px;
            width: 120px;
        }
    } */
</style>

<body>
    <!-- <h3 class="askToRotate" style="display: none;">請旋轉螢幕</h3> -->
    <div class="desk-page">

        <div class="back">
            <div class="incense">
                <div class="smoke"></div>
            </div>
            <div class="core"><button class="coreBtn"></button>
            </div>
            <div class="pc">
                <button class="pcBtn"></button>
                <div class="signal"></div>
                <p class="hint" style="display: none;">please inert the password</p>
                <p class="hintIncorrect" style="display: none;">Incorrect number</p>
                <div class="screen" style="display: none;">
                    <input type="text" id="key1">
                    <input type="text" id="key2">
                    <input type="text" id="key3">
                    <input type="text" id="key4">
                </div>
                <input type="button" value="submit" class="keyBtn" style="display: none;">
            </div>


        </div>
        <div class="front">
            
        </div>

    </div>

    <body>
        <script>
            const key1 = document.getElementById("key1");
            const key2 = document.getElementById("key2");
            const key3 = document.getElementById("key3");
            const key4 = document.getElementById("key4");
            const keyBtn = document.getElementsByClassName("keyBtn")[0];
            const coreBtn = document.getElementsByClassName("coreBtn")[0];
            const screenElement = document.getElementsByClassName("screen")[0];
            const hint = document.getElementsByClassName("hint")[0];
            const hintIncorrect = document.getElementsByClassName("hintIncorrect")[0];

            const pcBtn = document.getElementsByClassName("pcBtn")[0];
            const pcSignal = document.getElementsByClassName("signal")[0];
            let pcSignalOn = false;

            keyBtn.addEventListener('click', () => {
                if (key1.value == "0" && key2.value == "0" && key3.value == "0" && key4.value == "0") {
                    window.location.replace("cake.html");
                } else {
                    hint.setAttribute("style", "display:none");
                    hintIncorrect.setAttribute("style", "display:''");
                    key1.style.color = "rgba(229, 45, 16, 0.87)";
                    key2.style.color = "rgba(229, 45, 16, 0.87)";
                    key3.style.color = "rgba(229, 45, 16, 0.87)";
                    key4.style.color = "rgba(229, 45, 16, 0.87)";
                    key1.style.borderColor = "rgba(229, 45, 16, 0.87)";
                    key2.style.borderColor = "rgba(229, 45, 16, 0.87)";
                    key3.style.borderColor = "rgba(229, 45, 16, 0.87)";
                    key4.style.borderColor = "rgba(229, 45, 16, 0.87)";
                    setTimeout(() => {
                        hint.setAttribute("style", "display:''");
                        hintIncorrect.setAttribute("style", "display:none");
                        key1.value = '';
                        key2.value = '';
                        key3.value = '';
                        key4.value = '';
                        key1.style.color = "rgba(35, 228, 48, 0.87)";
                        key2.style.color = "rgba(35, 228, 48, 0.87)";
                        key3.style.color = "rgba(35, 228, 48, 0.87)";
                        key4.style.color = "rgba(35, 228, 48, 0.87)";
                        key1.style.borderColor = "rgba(35, 228, 48, 0.87)";
                        key2.style.borderColor = "rgba(35, 228, 48, 0.87)";
                        key3.style.borderColor = "rgba(35, 228, 48, 0.87)";
                        key4.style.borderColor = "rgba(35, 228, 48, 0.87)";
                    }, 1500);
                }
            })

            coreBtn.addEventListener('click', () => {
                if (pcSignalOn == true) {
                    hint.setAttribute("style", "display:''");
                    screenElement.setAttribute("style", "display:''");
                    keyBtn.setAttribute("style", "display:''");
                    coreBtn.style.outlineColor = rgba(35, 228, 48, 0.87);
                }

            })

            pcBtn.addEventListener('click', () => {
                if (!pcSignalOn) {
                    
                    pcSignal.style.backgroundColor = "rgba(35, 228, 48, 0.87)";
                    pcSignalOn = true;
                }else{
                    pcSignal.style.backgroundColor = "rgba(56, 56, 56, 0.87)";
                    pcSignalOn = false;
                }
                
                
            })
        </script>

</html>
