<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');

    body {
        align-items: center;
        justify-content: center;
        text-align: center;

        display: flex;

        background-color: rgb(77, 77, 77);
    }

    .desk-page {
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .back {
        display: flex;
        flex-direction: row;
    }

    .pc {
        background-image: url("img/pc.png");
        width: 500px;
        height: 500px;

        background-repeat: no-repeat;
        background-color: transparent;

        position: relative;

        margin-left: 10px;
    }



    .hint {
        color: rgba(35, 228, 48, 0.87);
        font-family: "Jersey 15", sans-serif;

        position: absolute;
        text-align: center;
        align-items: center;
        justify-content: center;
        top: 30%;
        left: 30%;
        font-size: 20px;
    }

    .screen {
        display: flex;
        flex-direction: row;
        justify-items: center;
        text-align: center;

        position: absolute;

        top: 40%;
        width: 50%;
        gap: 5%;
        left: 38%;

    }

    .pcBtn {
        background-image: url("img/pc-on-off.png");
        background-size: contain;
        width: 25px;
        height: 25px;
        position: absolute;
        bottom: 12%;
        right: 20%;
        border-radius: 50%;
    }

    .signal {
        height: 8px;
        width: 8px;
        border-radius: 50%;
        background-color: rgba(56, 56, 56, 0.87);
        position: absolute;
        bottom: 12%;
        right: 28%;
    }

    #key1,
    #key2,
    #key3 {
        color: rgba(35, 228, 48, 0.87);
        font-size: 30px;
        border-color: rgba(35, 228, 48, 0.87);
        border-style: dashed;
        text-align: center;
        /* border-radius: 20%; */
        font-family: "Jersey 15", sans-serif;

        width: 25px;
        height: 25px;

        background-color: transparent;

        caret-color: rgba(35, 228, 48, 0.87);

        outline: none;
    }

    .keyBtn {
        position: absolute;
        top: 50%;
        left: 45%;
        text-align: center;
        align-items: center;
        height: 30px;
        width: 50px;
        background-color: rgba(35, 228, 48, 0.87);
        border: none;
        border-radius: 10px;
        font-family: "Jersey 15", sans-serif;
        font-size: 15px;
        color: #F1E7D2;
    }

    .keyBtn:hover {
        background-color: rgba(34, 167, 43, 0.87);
        color: #bda97f;
    }

    .core {
        background-image: url("img/core.png");
        background-color: transparent;
        height: 500px;
        width: 180px;
        position: relative;
    }

    .coreBtn {
        background-image: url("img/on-off.png");
        background-position: center;
        background-size: contain;
        position: absolute;
        bottom: 20%;
        right: 15%;
        width: 30px;
        height: 30px;

    }

    .askToRotate {
        background-color: black;
        color: beige;
        height: 100vh;
        width: 100vw;
    }

    @media (orientation: portrait) {
        .askToRotate {
            display: revert;
        }
    }

    @media (orientation: landscape) {
        .askToRotate {
            display: none;
        }
    }


    @media(min-width:1200px) {}
</style>

<body>
    <div class="askToRotate" style="display: none;">請旋轉螢幕</div>
    <div class="desk-page">

        <div class="back">
            <div class="core"><button class="coreBtn"></button>
            </div>
            <div class="pc">
                <button class="pcBtn"></button>
                <div class="signal"></div>
                <p class="hint" style="display: none;">please inert the password</p>
                <div class="screen" style="display: none;">
                    <input type="text" id="key1">
                    <input type="text" id="key2">
                    <input type="text" id="key3">
                </div>
                <input type="button" value="submit" class="keyBtn" style="display: none;">
            </div>

        </div>

    </div>

    <body>
        <script>
            const key1 = document.getElementById("key1");
            const key2 = document.getElementById("key2");
            const key3 = document.getElementById("key3");
            const keyBtn = document.getElementsByClassName("keyBtn")[0];
            const coreBtn = document.getElementsByClassName("coreBtn")[0];
            const screenElement = document.getElementsByClassName("screen")[0];
            const hint = document.getElementsByClassName("hint")[0];

            const pcBtn = document.getElementsByClassName("pcBtn")[0];
            const pcSignal = document.getElementsByClassName("signal")[0];
            let pcSignalOn = false;

            keyBtn.addEventListener('click', () => {
                if (key1.value == "2" && key2.value == "2" && key3.value == "2") {
                    alert("Congrats!!");
                    // console.log("correct");
                }
            })

            coreBtn.addEventListener('click', () => {
                if (pcSignalOn == true) {
                    hint.setAttribute("style", "display:''");
                    screenElement.setAttribute("style", "display:''");
                    keyBtn.setAttribute("style", "display:''");
                    coreBtn.style.outlineColor = rgba(35, 228, 48, 0.87);
                }

            })

            pcBtn.addEventListener('click', () => {
                pcSignal.style.backgroundColor = "rgba(35, 228, 48, 0.87)";
                pcSignalOn = true;
            })
        </script>

</html>
