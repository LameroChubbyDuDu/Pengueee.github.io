<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');
    body {
        align-items: center;
        justify-content: center;
        text-align: center;

        display: flex;

        background-color: rgb(77, 77, 77);
    }

    .desk-page {
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .pc {
        background-image: url("img/pc.png");
        width: 500px;
        height: 500px;

        background-repeat: no-repeat;
        background-color: transparent;

        position: relative;
    }

    

    .hint{
        color: rgba(35, 228, 48, 0.87);
        font-family: "Jersey 15", sans-serif;

        position: absolute;
        text-align: center;
        align-items: center;
        justify-content: center;
        top: 30%;
        left: 33%;
        font-size: 20px;
    }

    .screen{
        display: flex;
        flex-direction:row;
        justify-items: center;
        text-align: center;

        position: absolute;

        top: 40%;
        width: 50%;
        gap: 5%;
        left: 40%;

    }

    .key1, .key2, .key3 {
        color: rgba(35, 228, 48, 0.87);
        font-size: 30px;
        border-color: rgba(35, 228, 48, 0.87);
        border-style: dashed;
        /* border-radius: 20%; */
        font-family: "Jersey 15", sans-serif;

        width: 25px;
        height: 25px;

        background-color: transparent;

        caret-color: rgba(35, 228, 48, 0.87);

        outline: none;
    }


    @media(min-width:1200px) {}
</style>

<body>
    <div class="desk-page">
        <div class="pc">
            <p class="hint">please inert the password</p>
            <div class="screen">   
                <input type="text" class="key1">
                <input type="text" class="key2">
                <input type="text" class="key3">
            </div>
        </div>

    </div>

    <body>
        <script>
        </script>

</html>
