<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap');

    body {
        align-items: center;
        justify-content: center;
        text-align: center;

        display: flex;

        /* background:linear-gradient(90deg, rgb(216, 68, 68) 5px, rgb(247, 175, 175) 5px, transparent 5px), 
        linear-gradient(rgb(216, 68, 68) 5px, rgb(247, 175, 175) 5px, transparent 5px);
        background-size: 50px 50px ; */

        background-color: rgb(255, 226, 183);

    }

    .match-box {
        background-image: url("img/match-box.png");
        background-size: contain;
        background-repeat: no-repeat;
        width: 300px;
        height: 300px;
        border: none;
        background-color: transparent;
        left: 80vw;
        top: 50vh;
        position: absolute;

    }

    .match {
        background-image: url("img/match.png");
        background-size: contain;
        background-repeat: no-repeat;
        width: 220px;
        height: 220px;
        cursor: grab;
        z-index: 999;
        left: 80vw;
        top: 40vh;
        position: absolute;
    }

    .match-box-fake {
        width: 150px;
        height: 150px;
        border: none;
        background-color: rgb(181, 29, 29);
        /* left: 20px; */
        margin-right: 5px;
        position: absolute;
    }

    .cake {
        background-image: url("img/cake-2.png");
        background-repeat: no-repeat;
        background-size: contain;
        width: 64vw;
        height: 36vw;
        /* margin-top: -60px; */
        top: 10%;
        left: 5%;
        position: fixed;
    }

    .hint-1 {
        background-color: rgb(67, 24, 6);
        /* background: linear-gradient(90deg, #fff7f7 5px, #ce2f2f 5px, #ce2f2f 10px, transparent 10px), linear-gradient(#fff7f7 5px,#ce2f2f 5px, #ce2f2f 10px, transparent 10px);
        background-size: 20px 15px; */
        color: rgb(255, 240, 218);
        font-size: 25px;
        width: 20vw;
        height: 5vh;
        position: absolute;
        top: 0vh;
        left: 0vw;
        z-index: 9999;
        text-align: center;
        font-family: "Jersey 15", sans-serif;
    }

    .hint-2 {
        background-color: beige;
        color: black;
        width: 25vw;
        height: 8vh;
        position: absolute;
        top: 40vh;
        left: 40vw;
        z-index: 9999;
        text-align: center;
        font-family: "Jersey 15", sans-serif;
        font-size: 20px;
    }

    .fire {
        animation: firing 3s ease-in-out infinite;
        clip-path: ellipse(40% 50% at 50% 80%);
        border-radius: 60% 60% 60% 60% / 80% 80% 30% 30%;
        width: 35px;
        height: 35px;
        overflow: visible;
        background-color: rgb(236, 128, 40);
        opacity: 0.5;
        z-index: 99999;
        position: absolute;
        top: 14vh;
        left: 40vw;
    }

    .fake-candle {
        width: 30px;
        height: 50px;
        background-color: transparent;
        position: absolute;
        top: 13vh;
        left: 40.2vw;
        z-index: 9999;

    }

    footer {
        font-family: "Jersey 15", sans-serif;
        position: fixed;
        bottom: 0;
        width: 100%;
        color:rgb(127, 61, 0);
        text-align: center;
        z-index: 9999;
    }

    @keyframes firing {
        0% {
            clip-path: ellipse(45% 100% at 50% 80%);
            background-color: rgb(243, 135, 26);
            opacity: 0.4;
            transform: rotate(3deg);
        }

        50% {
            clip-path: ellipse(55% 80% at 50% 80%);
            background-color: rgb(250, 201, 53);
            opacity: 0.5;
            transform: rotate(-3deg);
        }
    }
</style>

<body class="bg">
    <div class="cake-page">
        <div class="hint-1">Light the candle.</div>
        <div class="hint-2" style="display:none;">You have to light up the match first.</div>

            <input type="button" class="match-box">
        </div>

        <div class="match" style="display: none;" draggable="true"></div>

        <div class="fire" style="display:none;"></div>

    </div>

</html>
