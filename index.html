<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Titan+One&family=Vast+Shadow&display=swap');

    body {
        align-items: center;
        justify-content: center;
        text-align: center;

        display: flex;

        background: linear-gradient(90deg, #65aeb8 5px, transparent 5px),
            linear-gradient(#65aeb8 5px, transparent 5px);
        /* background-size: 100px 100%, 200px 100%, 100% 100px, 100% 200px; */
        background-size: 50px 50px;
    }

    .main-page {
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .penguin {
        background-image: url("img/penguin.PNG");
        background-color: transparent;
        height: 1200px;
        width: 1200px;
        background-repeat: no-repeat;
        background-size: cover;

        animation: penguinAnimation 2s linear 0s infinite;

    }



    .penguinTrigger {
        height: 800px;
        width: 650px;
        position: fixed;
        top: calc(50vh - 600px);
        left: calc(50vw - 325px);
        background-color: blue;
        /* color: blue; */
        z-index: 99;


    }

    .penguinTrigger:hover+.penguin {
        animation: penguinHoverAnimation 2s linear 0s infinite;
        z-index: 999;
    }


    .startBtn {
        height: 8vh;
        width: 15vw;
        margin-top: none;

        /* position: relative; */

        border-radius: 50%;
        border: none;
        background-color: rgb(255, 196, 0);
        font-size: 25px;
        color: antiquewhite;
        font-family: "Vast Shadow", serif;
    }

    .startBtn:hover {
        background-color: rgb(249, 89, 25);
        box-shadow: rgb(56, 39, 39) 5px 5px 8px;
    }

    @media(min-width:1200px) {
        .penguin {
            height: 500px;
            width: 500px;
        }

        .penguinTrigger {

            height: 350px;
            width: 250px;
            top: calc(50vh - 250px);
            left: calc(50vw - 125px);
            background-color: none;

        }

        .startBtn {
            margin-top: 20vh;
        }

    }

    @keyframes penguinAnimation {
        0% {
            transform: none;
        }

        50% {
            transform: rotate(15deg);
        }

        50% {
            transform: rotate(-15deg);
        }
    }

    @keyframes penguinHoverAnimation {
        0% {
            transform: rotate(360deg);
        }

        100% {
            transform: rotate(-360deg);
        }
    }
</style>

<body>
    <div class="main-page">
        <div class="penguinTrigger"></div>
        <div class="penguin"></div>

        <button class="startBtn">Los geht's</button>
    </div>

    <body>

</html>
