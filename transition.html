<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+15&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap');

    body {
        align-items: center;
        justify-content: center;
        text-align: center;

        display: flex;

        background-color: antiquewhite;
        /* background:linear-gradient(90deg, rgb(216, 68, 68) 5px, rgb(247, 175, 175) 10px, transparent 5px);
        background-size: 10px 10px ; */
    }

    .penguin-box{
        align-items: center;
        justify-content:center;
        text-align: center;

        display: flex;
        flex-direction: row;
        position: relative;

        top: 30vh;
    }
    
    .penguin-1, .penguin-2, .penguin-3{
        background-image: url("img/penguin.PNG");
        background-size: contain;
        background-repeat: no-repeat;
        width: 200px;
        height:200px;

        animation: danceAnimation 2s linear infinite;
    }



    @media(min-width:1200px) {}

    @keyframes danceAnimation {
        0%{
            transform:rotateZ(360deg);
        }
        100%{
            transform:rotateZ(-360deg);
        }
    }
</style>

<body>
    <div class="penguin-box">
        <div class="penguin-1"></div>
        <div class="penguin-2"></div>
        <div class="penguin-3"></div>
    </div>

    <body>
        <script>
            setTimeout(() =>{
                window.location.replace('cake.html');
            }, 2000);
        </script>

</html>
